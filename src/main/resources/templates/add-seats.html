<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Add Seats</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
	font-family: "Poppins", sans-serif;
	background: #f8f9fa;
	padding-top: 80px;
}

.container-box {
	max-width: 500px;
	margin: auto;
	background: #fff;
	padding: 30px;
	border-radius: 12px;
	box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
</style>
</head>

<body>
<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-white fixed-top shadow-sm px-4">
    
    <!-- BRAND -->
    <a class="navbar-brand fw-bold text-danger" href="/">🎬 BookMyTicket</a>

    <!-- RIGHT SIDE -->
    <div class="ms-auto d-flex align-items-center gap-3">
        
        <!-- BACK TO THEATERS -->
        <a href="/manage-theaters" class="btn btn-outline-danger">
            ⬅ Back to Theaters
        </a>

        <!-- OPTIONAL: BACK TO SCREENS -->
        <a th:href="@{'/manage-screens/' + ${theater.id}}" class="btn btn-outline-secondary">
            📺 Screens
        </a>

    </div>

</nav>

<div class="container-box">
	<h2 class="mb-4">➕ Generate Seats</h2>

	<form th:action="@{'/add-seats/' + ${id}}" method="post">

		<!-- TOTAL ROWS -->
		<div class="mb-3">
			<label>Total Rows</label>
			<input type="number" name="totalRows" class="form-control" required>
		</div>

		<!-- TOTAL COLUMNS -->
		<div class="mb-3">
			<label>Total Columns</label>
			<input type="number" name="totalColumns" class="form-control" required>
		</div>

		<!-- CATEGORY -->
		<div class="mb-3">
			<label>Seat Category</label>
			<select name="category" class="form-control">
				<option value="REGULAR">REGULAR</option>
				<option value="PREMIUM">PREMIUM</option>
				<option value="VIP">VIP</option>
			</select>
		</div>

		<button type="submit" class="btn btn-success w-100">
			⚡ Generate Seats
		</button>

	</form>
</div>

</body>
</html>
