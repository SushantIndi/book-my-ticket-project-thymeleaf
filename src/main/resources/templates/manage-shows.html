<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Shows - BookMyTicket</title>

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

<style>
body {
    font-family: "Poppins", sans-serif;
    background: #f8f9fa;
    min-height: 100vh;
    color: #2c3e50;
}

/* Navbar */
.navbar {
    background: #fff !important;
    padding: 1rem 2rem;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    border-bottom: 1px solid #e8e8e8;
}

.navbar-brand {
    font-weight: 800;
    font-size: 1.5rem;
    color: #e74c3c !important;
}

.nav-link {
    color: #555 !important;
    font-weight: 500;
}

.nav-link:hover {
    color: #e74c3c !important;
}

.btn-logout {
    background: #e74c3c;
    border: none;
    color: white;
    font-weight: 600;
    padding: 0.5rem 1.2rem;
    border-radius: 6px;
}

/* Container */
.admin-container {
    padding: 40px 20px;
    max-width: 1400px;
    margin: auto;
}

/* Header */
.admin-header {
    margin-bottom: 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.admin-header h1 {
    font-weight: 700;
}

.add-btn {
    background: #e74c3c;
    color: white;
    padding: 0.7rem 1.5rem;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
}

.add-btn:hover {
    background: #c0392b;
}

/* Table */
.table-wrapper {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e8e8e8;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}

.table thead th {
    background: #e74c3c;
    color: white;
    border: none;
    padding: 1rem;
    font-size: 0.9rem;
}

.table tbody td {
    padding: 1rem;
    font-weight: 500;
}

.table tbody tr:hover {
    background: #f8f9fa;
}

/* Action Button */
.btn-delete {
    background: #e74c3c;
    color: white;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    text-decoration: none;
    font-size: 0.8rem;
}

.btn-delete:hover {
    background: #c0392b;
}

/* Empty */
.empty-state {
    text-align: center;
    padding: 60px;
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e8e8e8;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">🎬 BookMyTicket</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/main">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/manage-movies">Movies</a></li>
                <li class="nav-item"><a class="nav-link" href="/manage-theaters">Theaters</a></li>
                <li class="nav-item"><a class="nav-link" href="/manage-users">Users</a></li>
                <li class="nav-item">
                    <button class="btn-logout" onclick="location.href='/logout'">Logout</button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- MAIN -->
<div class="admin-container">

    <!-- HEADER -->
    <div class="admin-header">
        <h1>🎬 Shows Management</h1>
        <a th:href="'/add-show/'+${id}" class="add-btn">+ Add Show</a>
    </div>

    <!-- TABLE -->
    <div th:if="${shows != null and !shows.isEmpty()}">
        <div class="table-wrapper">
            <table class="table">
                <thead>
                    <tr>
                        <th>Show Date</th>
                        <th>Start Time</th>
                        <th>End Time</th>
                        <th>Movie</th>
                        <th>Price</th>
                        <th>Seats</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="show : ${shows}">
                        <td th:text="${show.showDate}"></td>
                        <td th:text="${show.startTime}"></td>
                        <td th:text="${show.endTime}"></td>
                        <td th:text="${show.movie.name}"></td>
                        <td th:text="${show.ticketPrice}"></td>
                        <td th:text="${#lists.size(show.seats)}"></td>

                        <td>
                            <a th:href="'/delete-show/'+${show.id}" class="btn-delete">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- EMPTY STATE -->
    <div th:if="${shows == null or shows.isEmpty()}" class="empty-state">
        <h2>📭 No Shows Found</h2>
        <p>No shows available. Add your first show to get started.</p>
        <a th:href="'/add-show/'+${id}" class="add-btn">+ Add Show</a>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
