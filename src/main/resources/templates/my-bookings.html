<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>My Bookings - BookMyTicket</title>

	<link rel="icon" type="image/svg+xml" href="/favicon.svg">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

	<style>
		/* SAME CSS AS YOUR MANAGE USER PAGE */
		* { margin:0; padding:0; box-sizing:border-box; }

		body {
			font-family: "Poppins", sans-serif;
			background: linear-gradient(135deg, #f0f4f8 0%, #e8f0f7 50%, #f0f4f8 100%);
			min-height: 100vh;
			color: #1a2332;
		}

		.navbar {
			background: rgba(255,255,255,0.96);
			box-shadow: 0 4px 20px rgba(100,150,255,0.1);
			padding: 15px 0;
		}

		.navbar-brand {
			font-weight: 900;
			font-size: 1.5rem;
			background: linear-gradient(135deg, #6496ff 0%, #ff4081 100%);
			-webkit-background-clip: text;
			background-clip: text;
			-webkit-text-fill-color: transparent;
		}

		.admin-container {
			padding: 40px 20px;
			max-width: 1200px;
			margin: 0 auto;
		}

		.admin-header {
			margin-bottom: 40px;
			display: flex;
			justify-content: space-between;
			align-items: center;
		}

		.admin-header h1 {
			font-weight: 700;
			font-size: 2rem;
		}

		.back-link {
			background: linear-gradient(135deg, #6496ff 0%, #ff4081 100%);
			color: white;
			padding: 10px 24px;
			border-radius: 10px;
			text-decoration: none;
		}

		.table-wrapper {
			background: linear-gradient(135deg, rgba(100,150,255,0.08), rgba(255,64,129,0.04));
			border-radius: 15px;
			border: 1.5px solid rgba(100,150,255,0.2);
			overflow: hidden;
		}

		.table thead th {
			background: linear-gradient(135deg, #6496ff, #ff4081);
			color: white;
			padding: 18px;
		}

		.table tbody td {
			padding: 16px;
			font-weight: 500;
		}

		.table tbody tr:hover {
			background: rgba(100,150,255,0.08);
		}

		.empty-state {
			text-align: center;
			padding: 60px;
		}
	</style>
</head>

<body>

	<!-- NAVBAR -->
	<nav class="navbar navbar-expand-lg">
		<div class="container-fluid">
			<a class="navbar-brand" href="/">📽️ BookMyTicket</a>
		</div>
	</nav>

	<!-- MAIN -->
	<div class="admin-container">

		<div class="admin-header">
			<h1>🎟️ My Bookings</h1>
			<a href="/" class="back-link">← Back to Home</a>
		</div>

		<!-- TABLE -->
		<div th:if="${tickets != null && tickets.size() > 0}" class="table-wrapper">
			<table class="table">
				<thead>
					<tr>
						<th>Movie</th>
						<th>Theater</th>
						<th>Screen</th>
						<th>Date</th>
						<th>Time</th>
						<th>Seats</th>
						<th>Amount</th>
						<th>QR</th>
					</tr>
				</thead>

				<tbody>
					<tr th:each="ticket : ${tickets}">
						<td th:text="${ticket.movieName}"></td>
						<td th:text="${ticket.theaterName}"></td>
						<td th:text="${ticket.screenName}"></td>
						<td th:text="${ticket.showDate}"></td>
						<td th:text="${ticket.showTiming}"></td>
						<td th:text="${ticket.seatNumber}"></td>
						<td>₹ <span th:text="${ticket.ticketPrice}"></span></td>
						<td>
							<img th:src="${ticket.qrUrl}" width="60"/>
						</td>
					</tr>
				</tbody>
			</table>
		</div>

		<!-- EMPTY -->
		<div th:if="${tickets == null || tickets.size() == 0}" class="empty-state">
			<h3>📭 No Bookings Yet</h3>
			<p>Looks like your movie journey hasn’t started yet 🍿</p>
		</div>

	</div>

</body>
</html>
